<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="widget">
    <!-- Title bar -->
    <div id="titlebar">
      <span id="titlebar-label">FJ Ticker</span>
      <div id="titlebar-controls">
        <span id="headline-count"></span>
        <button id="btn-settings" class="tb-btn" title="Settings">&#9881;</button>
        <button id="btn-minimize" class="tb-btn" title="Minimize">&#8211;</button>
        <button id="btn-close" class="tb-btn tb-close" title="Close">&#10005;</button>
      </div>
    </div>

    <!-- Headlines -->
    <div id="headlines-list"></div>

    <!-- Settings panel (hidden by default) -->
    <div id="settings-panel" class="hidden">
      <div class="settings-header">
        <span>Settings</span>
        <button id="btn-settings-close" class="tb-btn">&#10005;</button>
      </div>
      <div class="settings-body">

        <div class="setting-group">
          <label class="setting-label">Theme</label>
          <div class="setting-row">
            <button class="theme-btn" data-theme="dark">Dark</button>
            <button class="theme-btn" data-theme="light">Light</button>
          </div>
        </div>

        <div class="setting-group">
          <label class="setting-label">Background Color</label>
          <div class="setting-row">
            <input type="color" id="set-bg-color" class="color-input">
            <span id="set-bg-color-label" class="color-label">#0a0e1a</span>
          </div>
        </div>

        <div class="setting-group">
          <label class="setting-label">Text Color</label>
          <div class="setting-row">
            <input type="color" id="set-text-color" class="color-input">
            <span id="set-text-color-label" class="color-label">#ffffff</span>
          </div>
        </div>

        <div class="setting-group">
          <label class="setting-label">Accent Color</label>
          <div class="setting-row">
            <input type="color" id="set-accent-color" class="color-input">
            <span id="set-accent-color-label" class="color-label">#ffa500</span>
          </div>
        </div>

        <div class="setting-group">
          <label class="setting-label">Background Opacity</label>
          <div class="setting-row">
            <input type="range" id="set-bg-opacity" min="30" max="100" step="5" class="range-input">
            <span id="set-bg-opacity-label" class="range-label">100%</span>
          </div>
        </div>

        <div class="setting-group">
          <label class="setting-label">Refresh Interval</label>
          <div class="setting-row">
            <select id="set-interval" class="select-input">
              <option value="10">10 seconds</option>
              <option value="15">15 seconds</option>
              <option value="30">30 seconds</option>
              <option value="45">45 seconds</option>
              <option value="60">60 seconds</option>
              <option value="120">2 minutes</option>
            </select>
          </div>
        </div>

      </div>
    </div>
  </div>
  <script src="renderer.js"></script>
</body>
</html>
